name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  release:
    name: Build and publish desktop app
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches desktop version
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          TAG="${GITHUB_REF_NAME#desktop-v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag desktop-v$TAG does not match apps/desktop package version $VERSION"
            exit 1
          fi

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          pnpm --filter @hubble.md/desktop... --if-present build
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          pnpm --filter @hubble.md/desktop exec electron-builder --mac --publish always
